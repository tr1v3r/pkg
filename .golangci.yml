# golangci-lint configuration file
# Reference: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  # Timeout for analysis, e.g., 30s, 5m
  timeout: 10m

  # Concurrency of analysis
  concurrency: 4

  # Include test files in analysis
  tests: true

  # Which modules to include (default: all)
  modules-download-mode: readonly

  # Build tags to consider
  build-tags:
    - integration
    - demo

  # Skip directories
  skip-dirs:
    - vendor
    - testdata
    - examples

  # Skip files
  skip-files:
    - ".*\\.pb\\.go$"
    - ".*_generated\\.go$"
    - ".*_mock\\.go$"

# Output configuration
output:
  # Format: colored-line-number|line-number|json|tab|checkstyle|code-climate|junit-xml|github-actions
  format: colored-line-number

  # Print lines of code with issue
  print-issued-lines: true

  # Print linter name in the end of issue text
  print-linter-name: true

  # Make issues output unique by line
  uniq-by-line: false

# All available settings of specific linters
linters-settings:
  # Enable all available linters
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-tags:
      - diagnostic

    # Specific settings for gocritic checks
    settings:
      rangeValCopy:
        sizeThreshold: 256
      ruleguard:
        debug: false

  gocyclo:
    # Minimal code complexity to report
    min-complexity: 20

  dupl:
    # Tokens count to trigger issue, 150 by default
    threshold: 120

  goconst:
    # minimal length of string constant
    min-len: 3
    # minimum occurrences of constant string count to trigger issue
    min-occurrences: 3

  gofmt:
    # Simplify code: gofmt with -s
    simplify: true

  goimports:
    # Put imports beginning with prefix after 3rd-party packages
    local-prefixes: github.com/tr1v3r/pkg

  govet:
    # Report about shadowed variables
    check-shadowing: true
    # Enable all analyzers
    enable-all: true
    # Settings per analyzer
    settings:
      printf:
        funcs:
          - (github.com/tr1v3r/pkg/log.Logger).Infof
          - (github.com/tr1v3r/pkg/log.Logger).Warnf
          - (github.com/tr1v3r/pkg/log.Logger).Errorf
          - (github.com/tr1v3r/pkg/log.Logger).Fatalf
          - (github.com/tr1v3r/pkg/log.Logger).Debugf
          - (github.com/tr1v3r/pkg/log.Logger).Tracef

  lll:
    # Max line length, lines longer will be reported
    line-length: 120

  maligned:
    # Print struct with more effective memory layout or not, false by default
    suggest-new: true

  misspell:
    # Correct spellings using locale preferences for US or UK
    locale: US

  nolintlint:
    # Require explanation for nolint directives (disabled for SDK flexibility)
    require-explanation: false
    # Require specific explanation format
    require-specific: false

  unparam:
    # Check exported functions
    check-exported: false

  prealloc:
    # Report preallocation suggestions
    simple: true
    range-loops: true
    for-loops: false

  gosec:
    # Global configuration
    severity: medium
    confidence: medium
    # Exclude specific rules
    exclude:
      - G115  # Integer overflow conversion (common in SDK)
      - G204  # Subprocess launching with tainted input (SDK flexibility)
      - G304  # File path provided by taint source (SDK flexibility)

# Linters configuration - enable essential linters for SDK
linters:
  enable:
    - errcheck               # Check for unchecked errors
    - govet                  # Static analysis (enabled by default)
    - ineffassign            # Detect ineffectual assignments
    - staticcheck            # Staticcheck analysis
    - unused                 # Check for unused code
    - gocyclo                # Cyclomatic complexity
    - dupl                   # Code duplication
    - goconst                # Magic strings
    - gocritic               # Go critic checks
    - gosec                  # Security checks
    - misspell               # Spell checking
    - prealloc               # Slice preallocation
    - bodyclose              # HTTP body closing
    - dogsled                # Too many blank identifiers
    - nakedret               # Naked returns
    - unconvert              # Unnecessary type conversions


issues:
  # List of regexps of issue texts to exclude
  exclude-rules:
    # Exclude linters from test files
    - path: _test\.go
      linters:
        - gocyclo
        - dupl
        - goconst
        - gosec
        - errcheck
        - prealloc
        - ineffassign
        - dogsled
        - nakedret
        - gocritic

    # Exclude linters from example/demo files
    - path: (.*demo/.*\.go|.*example/.*\.go)
      linters:
        - gocyclo
        - dupl
        - goconst
        - gosec
        - errcheck
        - prealloc
        - ineffassign

    # Exclude common false positives
    - linters:
        - gosec
      text: "G104"  # Errors unhandled

    # Exclude shadowing in certain contexts
    - linters:
        - govet
      text: "shadow: declaration of \"err\""

    # Exclude error wrapping suggestions for SDK flexibility
    - linters:
        - errcheck
      text: "Error return value is not checked"

  # Maximum issues count per one linter. Set to 0 to disable
  max-issues-per-linter: 0

  # Maximum count of issues with the same text. Set to 0 to disable
  max-same-issues: 0

  # Exclude certain files from specific checks
  exclude-use-default: false

# Paths to exclude from linting
exclude:
  - "**/*_test.go"
  - "**/testdata/*"
  - "**/vendor/*"
  - "**/demo/*"
  - "**/examples/*"

# Files to skip from analysis
skip-files:
  - "notion/databases.go"
  - "websocket/cilent.go"

# Severity configuration
severity:
  # Default severity for issues
  default-severity: error

  # Case sensitivity
  case-sensitive: false